syntax = "proto3";

package io.harness.pms.conversion.proto;

option go_package = "github.com/drone/go-convert/proto";
option java_multiple_files = true;
option java_package = "io.harness.pms.conversion.proto";

enum EntityType {
  PIPELINE = 0;
  TEMPLATE = 1;
  INPUT_SET = 2;
  TRIGGER = 3;
}

message ConvertRequest {
  EntityType entity_type = 1;
  string yaml = 2;
  map<string, string> template_ref_mapping = 3;
  map<string, string> pipeline_ref_mapping = 4;
  string context_pipeline_yaml = 5; // Optional v0 pipeline YAML for expression post-processing context for inputset/trigger conversion
}

// Severity classifies a converter message.
enum Severity {
  INFO = 0;
  WARNING = 1;
  ERROR = 2;
}

// ConversionStatus indicates whether an expression was converted.
enum ConversionStatus {
  SUCCESS = 0;
  NOT_CONVERTED = 1;
}

// ConverterMessage is a single structured converter notice.
message ConverterMessage {
  Severity severity = 1;
  string code = 2; // e.g. UNKNOWN_STEP_TYPE, UNKNOWN_STAGE_TYPE
  string message = 3;
  map<string, string> context = 4;
}

// ExpressionEntry pairs a v0 expression with its v1 conversion.
message ExpressionEntry {
  string original = 1;
  string converted = 2;
  ConversionStatus status = 3;
}

// ConversionReport bundles everything emitted by one conversion: structured
// converter messages, the list of unrecognized input fields, and per-
// expression conversion entries.
message ConversionReport {
  repeated ConverterMessage messages = 1;
  repeated string unrecognized_fields = 2;
  repeated ExpressionEntry expressions = 3;
}

message ConvertResponse {
  string yaml = 1;
  string checksum = 2;
  ConversionReport report = 3;
}

message ChecksumRequest {
  string yaml = 1;
}

message ChecksumResponse {
  string checksum = 1;
}

// ExpressionConvertRequest is the request for ConvertExpression.
message ExpressionConvertRequest {
  // A single expression to convert (use this OR expressions, not both).
  string expression = 1;

  // Multiple expressions to convert (use this OR expression, not both).
  repeated string expressions = 2;

  // Optional v0 pipeline YAML. When provided the server structurally
  // converts this pipeline to derive step-type and v1-path maps
  // automatically. Supersedes manual context fields.
  string context_pipeline_yaml = 3;

  // Optional manual context (ignored when context_pipeline_yaml is provided).
  ExpressionContext context = 4;

  // Raw contents of a remote file (manifest, values.yaml, config, etc.)
  // containing embedded <+...> expressions. The server scans the string
  // and converts every expression found, returning the file with all
  // expressions replaced.
  string remote_file = 5;
}

// ExpressionContext holds manual metadata for expression conversion.
message ExpressionContext {
  string current_step_id = 1;
  string current_step_type = 2;
  string current_step_v1_path = 3;
  map<string, string> step_type_map = 4;
  map<string, string> step_v1_path_map = 5;
  bool use_fqn = 6;
}

// ExpressionConvertResponse is the response for ConvertExpression.
message ExpressionConvertResponse {
  // Converted single expression (set when the request used `expression`).
  string expression = 1;

  // Converted expressions map: original → converted (set when the request used `expressions`).
  map<string, string> expressions = 2;

  // SHA-256 checksum of the converted output.
  string checksum = 3;

  // The remote file contents with all embedded expressions converted.
  string remote_file = 4;
}

service GoConvertService {
  rpc ConvertPipeline(ConvertRequest) returns (ConvertResponse);
  rpc ConvertTemplate(ConvertRequest) returns (ConvertResponse);
  rpc ConvertInputSet(ConvertRequest) returns (ConvertResponse);
  rpc ConvertTrigger(ConvertRequest) returns (ConvertResponse);
  rpc ConvertExpression(ExpressionConvertRequest) returns (ExpressionConvertResponse);
  rpc GetChecksum(ChecksumRequest) returns (ChecksumResponse);
}
